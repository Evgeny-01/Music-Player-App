<!DOCTYPE html>
<html class="page" lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Music Plaer App</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="preload" href="#" type="font/woff2" as="font">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
  <link rel="stylesheet" href="styles/styles.css">
</head>

<body class="page__body">
  <main class="main">

    <section class="hero">
      <h1 class="visually-hidden">Плей лист</h1>
      <div class="background">
        <img src="images/background-gradient@1x.jpg" alt="Фон градиент" id="bg-img">
      </div>
      <div class="container">
        <div class="player-img">
          <img class="active" src="images/background-gradient@1x.jpg" alt="Фон градиент" id="cover">
        </div>
        <h2 id="music-title">Test</h2>
        <h3 id="music-artist">Test h2</h3>
        <div class="player-progress" id="player-progress">
          <div class="progress" id="progress"></div>
          <div class="music-duration">
            <span id="current-time">0:00</span>
            <span id="duration">0:00</span>
          </div>
        </div>
        <div class="player-controls">
          <i class="fa-solid fa-backward" title="Previous"></i>
          <i class="fa-solid fa-play play-button" title="Play"></i>
          <i class="fa-solid fa-forward" title="Next"></i>
        </div>
      </div>
    </section>

  </main>
  <script src="scripts/index.js" defer></script>
</body>

</html>
